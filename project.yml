name: Tabbed
options:
  bundleIdPrefix: dev.local
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "W9C2P3N7Q2"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Development: zxzimeng@gmail.com (4F7GA4MB42)"
    PROVISIONING_PROFILE_SPECIFIER: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Tabbed:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.local.Tabbed
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Tabbed.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Accessibility/Tabbed-Bridging-Header.h
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
